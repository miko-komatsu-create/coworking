<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>入退館 — コワーキングスペース</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; }
.page { max-width: 480px; margin: 0 auto; padding: 2rem 1rem 4rem; }
.logo { text-align: center; margin-bottom: 2rem; }
.logo-title { font-size: 20px; font-weight: 700; }
.logo-sub { font-size: 13px; color: #888; margin-top: 4px; }
.screen { display: none; }
.screen.active { display: block; }

/* チェックイン画面 */
.checkin-card { background: #fff; border-radius: 20px; border: 1px solid #e8e8e4; padding: 2.5rem 2rem; text-align: center; }
.ci-av { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; margin: 0 auto 1rem; }
.ci-name { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.ci-sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
.ci-interests { font-size: 13px; color: #555; background: #f0f0ec; border-radius: 99px; padding: 4px 14px; display: inline-block; margin-bottom: 1.5rem; }
.ci-status { font-size: 14px; margin-bottom: 1.75rem; padding: 12px; background: #f5f5f3; border-radius: 10px; }
.ci-status.in { color: #085041; background: #E1F5EE; }
.btn-checkin  { width: 100%; padding: 18px; background: #1D9E75; color: #fff; border: none; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
.btn-checkout { width: 100%; padding: 18px; background: #fff; color: #0F6E56; border: 2px solid #1D9E75; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
.btn-other { width: 100%; padding: 10px; background: none; border: none; color: #bbb; font-size: 13px; cursor: pointer; margin-top: 4px; }

/* 完了画面 */
.done-card { background: #fff; border-radius: 20px; border: 1px solid #e8e8e4; padding: 2.5rem 2rem; text-align: center; }
.done-icon { font-size: 56px; margin-bottom: 1rem; }
.done-msg { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.done-sub { font-size: 14px; color: #888; margin-bottom: 1.75rem; }
.done-time { font-size: 13px; color: #1D9E75; margin-bottom: 1.5rem; }
.btn-return { width: 100%; padding: 14px; background: #f0f0ec; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }

/* 登録フォーム */
.form-header { text-align: center; margin-bottom: 1.5rem; }
.form-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.form-sub { font-size: 13px; color: #888; }
.card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e4; padding: 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 1rem; }
.field { margin-bottom: 1rem; }
.field:last-child { margin-bottom: 0; }
.flabel { font-size: 13px; color: #555; display: block; margin-bottom: 5px; }
.flabel span { color: #aaa; font-size: 11px; margin-left: 4px; }
.finput { font-size: 15px; padding: 11px 13px; border: 1px solid #d8d8d4; border-radius: 9px; background: #fff; color: #1a1a18; width: 100%; }
.finput:focus { outline: none; border-color: #1D9E75; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-top: 1px solid #f0f0ec; }
.toggle-lbl { font-size: 13px; color: #555; }
.toggle { position: relative; width: 40px; height: 22px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.tslider { position: absolute; inset: 0; background: #ccc; border-radius: 11px; transition: .2s; cursor: pointer; }
.tslider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
input:checked + .tslider { background: #1D9E75; }
input:checked + .tslider:before { transform: translateX(18px); }
.btn-register { width: 100%; padding: 15px; background: #1D9E75; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: .5rem; }
.btn-register:disabled { background: #aaa; cursor: not-allowed; }
.err { background: #FCEBEB; color: #A32D2D; border-radius: 8px; padding: .75rem 1rem; font-size: 13px; margin-bottom: 1rem; display: none; }
.loading-screen { text-align: center; padding: 4rem 1rem; color: #aaa; }
.loading-spinner { font-size: 32px; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 既存ユーザー確認 */
.already-card { background: #fff; border-radius: 20px; border: 1px solid #e8e8e4; padding: 2rem; text-align: center; }
.already-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.already-sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
.btn-yes { width: 100%; padding: 14px; background: #1D9E75; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
.btn-no  { width: 100%; padding: 14px; background: #f0f0ec; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div class="page">
  <div class="logo">
    <div class="logo-title">コワーキングスペース</div>
    <div class="logo-sub">入退館</div>
  </div>

  <!-- ローディング -->
  <div class="screen active" id="screen-loading">
    <div class="loading-screen">
      <div class="loading-spinner">⏳</div>
      <div>読み込み中…</div>
    </div>
  </div>

  <!-- チェックイン/アウト -->
  <div class="screen" id="screen-checkin">
    <div class="checkin-card">
      <div class="ci-av" id="ci-av"></div>
      <div class="ci-name" id="ci-name"></div>
      <div class="ci-sub"  id="ci-sub"></div>
      <div id="ci-interests-wrap" style="display:none"><div class="ci-interests" id="ci-interests"></div></div>
      <div class="ci-status" id="ci-status"></div>
      <button class="btn-checkin"  id="btn-in"  onclick="doCheckin(true)"  style="display:none">✅ 入館する</button>
      <button class="btn-checkout" id="btn-out" onclick="doCheckin(false)" style="display:none">👋 退館する</button>
      <button class="btn-other" onclick="showOtherUser()">別の人としてチェックイン</button>
    </div>
  </div>

  <!-- 完了 -->
  <div class="screen" id="screen-done">
    <div class="done-card">
      <div class="done-icon" id="done-icon"></div>
      <div class="done-msg"  id="done-msg"></div>
      <div class="done-sub"  id="done-sub"></div>
      <div class="done-time" id="done-time"></div>
    </div>
  </div>

  <!-- 既存ユーザー確認（デバイスリセット後） -->
  <div class="screen" id="screen-already">
    <div class="already-card">
      <div style="font-size:36px;margin-bottom:1rem">📱</div>
      <div class="already-title">以前登録したことがありますか？</div>
      <div class="already-sub">このデバイスの登録情報が見つかりませんでした。以前登録済みの場合は名前で検索して再連携できます。</div>
      <button class="btn-yes" onclick="showRelink()">はい、以前登録しました</button>
      <button class="btn-no"  onclick="showRegister()">初めて登録する</button>
    </div>
  </div>

  <!-- 再連携（名前検索） -->
  <div class="screen" id="screen-relink">
    <div class="form-header">
      <div class="form-title">アカウントを探す</div>
      <div class="form-sub">登録済みの名前またはニックネームを入力してください</div>
    </div>
    <div class="err" id="relink-err"></div>
    <div class="card">
      <div class="field">
        <label class="flabel">名前・ニックネーム</label>
        <input id="relink-input" class="finput" type="text" placeholder="山田 太郎 または タロウ" oninput="searchRelink()">
      </div>
      <div id="relink-results" style="margin-top:.75rem"></div>
    </div>
    <button class="btn-no" onclick="showRegister()" style="width:100%;margin-top:8px">見つからない → 新規登録</button>
    <button class="btn-other" onclick="showScreen('screen-already')" style="width:100%;margin-top:4px">← 戻る</button>
  </div>

  <!-- 新規登録 -->
  <div class="screen" id="screen-register">
    <div class="form-header">
      <div class="form-title">新規登録</div>
      <div class="form-sub">登録後、QRを読み込むだけで入退館できます</div>
    </div>
    <div class="err" id="reg-err"></div>
    <div class="card">
      <div class="card-title">基本情報（管理者のみ表示）</div>
      <div class="field">
        <label class="flabel">本名</label>
        <input id="r-realname" class="finput" type="text" placeholder="山田 太郎">
      </div>
      <div class="field">
        <label class="flabel">メールアドレス <span>任意</span></label>
        <input id="r-email" class="finput" type="email" placeholder="taro@example.com">
      </div>
      <div class="field">
        <label class="flabel">属性</label>
        <select id="r-type" class="finput" onchange="onTypeChange('r')">
          <option value="">選択してください</option>
          <option value="学生（大学）">学生（大学）</option>
          <option value="高校生">高校生</option>
          <option value="中学生">中学生</option>
          <option value="コミュニケーター">コミュニケーター</option>
          <option value="スタッフ">スタッフ</option>
          <option value="URA">URA</option>
          <option value="社会人">社会人</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="field" id="r-grade-wrap" style="display:none">
        <label class="flabel">学年 <span>任意</span></label>
        <select id="r-grade" class="finput">
          <option value="">選択してください</option>
          <option>学部1年</option><option>学部2年</option><option>学部3年</option><option>学部4年</option>
          <option>修士1年</option><option>修士2年</option><option>博士</option>
        </select>
      </div>
      <div class="field" id="r-schoolgrade-wrap" style="display:none">
        <label class="flabel">学年 <span>任意</span></label>
        <input id="r-schoolgrade" class="finput" type="text" placeholder="例：2年">
      </div>
      <div class="field" id="r-affiliation-wrap" style="display:none">
        <label class="flabel">所属 <span>任意</span></label>
        <input id="r-affiliation" class="finput" type="text" placeholder="例：〇〇株式会社 営業部">
      </div>
      <div class="field" id="r-other-wrap" style="display:none">
        <label class="flabel">所属・活動など <span>任意</span></label>
        <input id="r-other" class="finput" type="text" placeholder="よろしければご所属や活動などをお書きください">
      </div>
    </div>
    <div class="card">
      <div class="card-title">公開プロフィール（在室ページに表示）</div>
      <div class="field">
        <label class="flabel">ニックネーム <span>任意</span></label>
        <input id="r-nickname" class="finput" type="text" placeholder="タロウ">
      </div>
      <div class="toggle-row">
        <span class="toggle-lbl">ニックネームを公開する</span>
        <label class="toggle"><input type="checkbox" id="t-nickname" checked><span class="tslider"></span></label>
      </div>
      <div class="toggle-row">
        <span class="toggle-lbl">学年・役職を公開する</span>
        <label class="toggle"><input type="checkbox" id="t-role"><span class="tslider"></span></label>
      </div>
    </div>
    <div class="card">
      <div class="card-title">興味・SNS（すべて任意）</div>
      <div class="field">
        <label class="flabel">興味のある分野・得意なこと</label>
        <input id="r-interests" class="finput" type="text" placeholder="AI、デザイン、起業など">
      </div>
      <div class="toggle-row">
        <span class="toggle-lbl">興味・得意分野を公開する</span>
        <label class="toggle"><input type="checkbox" id="t-interests"><span class="tslider"></span></label>
      </div>
      <div class="field" style="margin-top:.75rem">
        <label class="flabel">Facebook URL</label>
        <input id="r-facebook" class="finput" type="url" placeholder="https://facebook.com/...">
      </div>
      <div class="toggle-row">
        <span class="toggle-lbl">Facebookを公開する</span>
        <label class="toggle"><input type="checkbox" id="t-facebook"><span class="tslider"></span></label>
      </div>
      <div class="field" style="margin-top:.75rem">
        <label class="flabel">LinkedIn URL</label>
        <input id="r-linkedin" class="finput" type="url" placeholder="https://linkedin.com/in/...">
      </div>
      <div class="toggle-row">
        <span class="toggle-lbl">LinkedInを公開する</span>
        <label class="toggle"><input type="checkbox" id="t-linkedin"><span class="tslider"></span></label>
      </div>
    </div>
    <button class="btn-register" onclick="registerMember()">登録する</button>
    <button class="btn-other" onclick="showScreen('screen-already')" style="width:100%;margin-top:4px">← 戻る</button>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://qreaidasfzqiswowgsbo.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Fm-cnmeEKtXwBAZmbU89cQ_ZoA7bEI4';
const STORAGE_KEY = 'coworking_member_id';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const colorMap = {
  teal:   { bg: '#E1F5EE', text: '#085041' },
  blue:   { bg: '#E6F1FB', text: '#0C447C' },
  pink:   { bg: '#FBEAF0', text: '#72243E' },
  amber:  { bg: '#FAEEDA', text: '#633806' },
  purple: { bg: '#EEEDFE', text: '#3C3489' },
  coral:  { bg: '#FAECE7', text: '#711B0C' },
};

let currentMember = null;

function initials(name) {
  if (!name) return '?';
  const p = name.trim().split(/\s+/);
  return p.length >= 2 ? p[0][0] + p[1][0] : name.slice(0, 2);
}
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function showRegister()  { showScreen('screen-register'); }
function showRelink()    { showScreen('screen-relink'); }
function showOtherUser() { localStorage.removeItem(STORAGE_KEY); init(); }

// 起動時：localStorageにIDがあれば即チェックイン画面へ
async function init() {
  showScreen('screen-loading');
  const savedId = localStorage.getItem(STORAGE_KEY);
  if (savedId) {
    const { data, error } = await db.from('members').select('*').eq('id', savedId).single();
    if (data && !error) {
      showCheckinScreen(data);
      return;
    }
    // IDが無効（削除済みなど）
    localStorage.removeItem(STORAGE_KEY);
  }
  // 未登録 or リセット後
  showScreen('screen-already');
}

function showCheckinScreen(m) {
  currentMember = m;
  const dn = (m.show_nickname && m.nickname) ? m.nickname : m.name;
  const c  = colorMap[m.color] || colorMap.teal;
  document.getElementById('ci-av').style.background = c.bg;
  document.getElementById('ci-av').style.color      = c.text;
  document.getElementById('ci-av').textContent      = initials(dn);
  document.getElementById('ci-name').textContent    = dn;
  document.getElementById('ci-sub').textContent     = (m.show_role && m.role) ? m.role : '';
  if (m.show_interests && m.interests) {
    document.getElementById('ci-interests').textContent = m.interests;
    document.getElementById('ci-interests-wrap').style.display = 'block';
  } else {
    document.getElementById('ci-interests-wrap').style.display = 'none';
  }
  const statusEl = document.getElementById('ci-status');
  const btnIn    = document.getElementById('btn-in');
  const btnOut   = document.getElementById('btn-out');
  if (m.is_checked_in) {
    statusEl.textContent = '現在在室中 — ' + fmtTime(m.checked_in_at) + ' より';
    statusEl.className   = 'ci-status in';
    btnIn.style.display  = 'none';
    btnOut.style.display = 'block';
  } else {
    statusEl.textContent = '現在退室中です';
    statusEl.className   = 'ci-status';
    btnIn.style.display  = 'block';
    btnOut.style.display = 'none';
  }
  showScreen('screen-checkin');
}

async function doCheckin(isIn) {
  if (!currentMember) return;
  document.getElementById('btn-in').disabled  = true;
  document.getElementById('btn-out').disabled = true;
  const now = new Date().toISOString();
  const updates = isIn
    ? { is_checked_in: true, checked_in_at: now, visited_today: true }
    : { is_checked_in: false, checked_in_at: null };
  await db.from('members').update(updates).eq('id', currentMember.id);
  await db.from('checkin_logs').insert({
    member_id: currentMember.id, member_name: currentMember.name, action: isIn ? 'in' : 'out',
  });
  const dn = (currentMember.show_nickname && currentMember.nickname) ? currentMember.nickname : currentMember.name;
  document.getElementById('done-icon').textContent = isIn ? '✅' : '👋';
  document.getElementById('done-msg').textContent  = isIn ? 'いらっしゃい！' : 'お疲れ様でした！';
  document.getElementById('done-sub').textContent  = dn + 'さん';
  document.getElementById('done-time').textContent = fmtTime(now) + (isIn ? ' 入館' : ' 退館');
  showScreen('screen-done');
  // 3秒後に最新情報で戻る
  setTimeout(async () => {
    const { data } = await db.from('members').select('*').eq('id', currentMember.id).single();
    if (data) showCheckinScreen(data);
  }, 3000);
}

// 再連携：名前で検索
let relinkTimer = null;
async function searchRelink() {
  clearTimeout(relinkTimer);
  const q = document.getElementById('relink-input').value.trim();
  const resultsEl = document.getElementById('relink-results');
  if (q.length < 1) { resultsEl.innerHTML = ''; return; }
  relinkTimer = setTimeout(async () => {
    const { data } = await db.from('members').select('id, name, nickname, role').order('name');
    const filtered = (data || []).filter(m => {
      const n = (m.nickname || '').toLowerCase();
      const r = (m.name || '').toLowerCase();
      return n.includes(q.toLowerCase()) || r.includes(q.toLowerCase());
    });
    if (!filtered.length) { resultsEl.innerHTML = '<p style="font-size:13px;color:#aaa;padding:.5rem 0">見つかりませんでした</p>'; return; }
    resultsEl.innerHTML = filtered.map(m =>
      '<div onclick="relinkTo(\'' + m.id + '\')" style="padding:.75rem;border:1px solid #e8e8e4;border-radius:9px;margin-bottom:6px;cursor:pointer;background:#f9f9f7">'
      + '<div style="font-size:14px;font-weight:600">' + (m.nickname || m.name) + '</div>'
      + '<div style="font-size:12px;color:#888">' + (m.role || '') + '</div>'
      + '</div>'
    ).join('');
  }, 300);
}

async function relinkTo(id) {
  localStorage.setItem(STORAGE_KEY, id);
  const { data } = await db.from('members').select('*').eq('id', id).single();
  if (data) showCheckinScreen(data);
}

// 新規登録
// 属性切り替え
function onTypeChange(prefix) {
  const type = document.getElementById(prefix + '-type').value;
  const ids = ['grade-wrap','schoolgrade-wrap','affiliation-wrap','other-wrap'];
  ids.forEach(id => {
    const el = document.getElementById(prefix + '-' + id);
    if (el) el.style.display = 'none';
  });
  if (type === '学生（大学）')  document.getElementById(prefix + '-grade-wrap').style.display = 'block';
  if (type === '高校生' || type === '中学生') document.getElementById(prefix + '-schoolgrade-wrap').style.display = 'block';
  if (type === '社会人')        document.getElementById(prefix + '-affiliation-wrap').style.display = 'block';
  if (type === 'その他')        document.getElementById(prefix + '-other-wrap').style.display = 'block';
}

// 属性からrole文字列を生成
function buildRole(prefix) {
  const type = document.getElementById(prefix + '-type').value;
  if (type === '学生（大学）') {
    const grade = document.getElementById(prefix + '-grade').value;
    return grade ? grade : '学生（大学）';
  }
  if (type === '高校生' || type === '中学生') {
    const grade = document.getElementById(prefix + '-schoolgrade').value.trim();
    return grade ? type + grade : type;
  }
  if (type === '社会人') {
    const aff = document.getElementById(prefix + '-affiliation').value.trim();
    return aff ? '社会人・' + aff : '社会人';
  }
  if (type === 'その他') {
    const other = document.getElementById(prefix + '-other').value.trim();
    return other ? other : 'その他';
  }
  return type || 'メンバー';
}

async function registerMember() {
  const realName = document.getElementById('r-realname').value.trim();
  const errEl    = document.getElementById('reg-err');
  errEl.style.display = 'none';
  if (!realName) { errEl.style.display = 'block'; errEl.textContent = '本名を入力してください'; return; }
  const memberType = document.getElementById('r-type').value;
  if (!memberType) { errEl.style.display = 'block'; errEl.textContent = '属性を選択してください'; return; }
  const btn = document.querySelector('.btn-register');
  btn.disabled = true; btn.textContent = '登録中…';
  const nickname    = document.getElementById('r-nickname').value.trim();
  const role        = buildRole('r');
  const affiliation = memberType === '社会人' ? document.getElementById('r-affiliation').value.trim() || null : null;
  const colors      = ['teal','blue','pink','amber','purple','coral'];
  const { data, error } = await db.from('members').insert({
    name: realName, real_name: realName,
    email:          document.getElementById('r-email').value.trim() || null,
    role,
    member_type:    memberType,
    affiliation,
    nickname:       nickname || null,
    show_nickname:  document.getElementById('t-nickname').checked,
    show_role:      document.getElementById('t-role').checked,
    interests:      document.getElementById('r-interests').value.trim() || null,
    show_interests: document.getElementById('t-interests').checked,
    facebook_url:   document.getElementById('r-facebook').value.trim() || null,
    show_facebook:  document.getElementById('t-facebook').checked,
    linkedin_url:   document.getElementById('r-linkedin').value.trim() || null,
    show_linkedin:  document.getElementById('t-linkedin').checked,
    color:          colors[Math.floor(Math.random() * colors.length)],
  }).select().single();
  btn.disabled = false; btn.textContent = '登録する';
  if (error) { errEl.style.display = 'block'; errEl.textContent = '登録エラー: ' + error.message; return; }
  localStorage.setItem(STORAGE_KEY, data.id);
  showCheckinScreen(data);
}

init();
</script>
</body>
</html>
